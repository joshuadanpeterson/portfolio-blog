<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Blog Favicon Options</title>
  <desc id="desc">Six favicon concepts for Josh Peterson's public automation lab and reporter's notebook.</desc>
  <rect width="960" height="700" fill="#f8fafc"/>
  <style>
    .label{font:600 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
    .note{font:400 15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
    .card{fill:#fff;stroke:#e2e8f0;stroke-width:2}
  </style>
  <text x="64" y="68" class="label">Favicon concepts</text>
  <text x="64" y="96" class="note">Crisp, small-size marks for the Public Automation Lab / reporter's notebook site.</text>

