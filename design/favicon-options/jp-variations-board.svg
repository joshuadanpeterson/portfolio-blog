  <title id="title">JP Favicon Variations</title>
  <desc id="desc">Eight JP monogram favicon variations for Josh Peterson's portfolio site.</desc>
  <rect width="960" height="920" fill="#f8fafc"/>
  <style>
    .label{font:600 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
    .note{font:400 15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
    .card{fill:#fff;stroke:#e2e8f0;stroke-width:2}
  </style>
  <text x="64" y="68" class="label">JP favicon variations</text>
  <text x="64" y="96" class="note">Personal monogram options tuned for small browser-tab sizes.</text>

  <g transform="translate(64 135)">
    <rect class="card" width="190" height="210" rx="16"/>
